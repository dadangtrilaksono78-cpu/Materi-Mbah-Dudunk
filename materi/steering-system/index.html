<!DOCTYPE html>
<html>
<head>
    <title>Template Materi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }

        h2 { text-align: center; }

        .header {
            display: flex;
            align-items: stretch;
            border-bottom: 2px solid black;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .logo {
            height: 150px;
            width: auto;
            margin-right: 20px;
        }

        .header-text {
            flex: 1;
        }

        /* ✅ FIX: GRID LABEL + TITIK DUA SUPAYA LURUS */
        .input-row {
            display: grid;
            grid-template-columns: 140px 20px 1fr;
            align-items: center;
            margin: 6px 0;
        }

        .label {
            font-weight: normal;
        }

        .colon {
            text-align: center;
        }

        .input-inline {
            display: inline-block;
            border-bottom: 1px dotted black;
            min-width: 200px;
            outline: none;
        }

        .input-block {
            border-bottom: 1px dotted black;
            outline: none;
            min-height: 18px;
        }

        button {
            padding: 12px;
            width: 100%;
            background: green;
            color: white;
            border: none;
            margin-top: 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        #btnDownload.loading {
            background: gray;
            cursor: not-allowed;
        }

        #colorPicker {
            width: 60px;
            height: 40px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        .input-block, p {
            white-space: pre-wrap;
        } 
        .keterangan-gambar {
    margin-top: 10px;
        }

        .ket-item {
            display: flex;
            gap: 8px;
            margin: 4px 0;
        }

        .nomor {
            width: 20px;
            font-weight: bold;
        }

        .ket-text {
            flex: 1;
            border-bottom: 1px dotted black;
            min-height: 18px;
            outline: none;
        } 
        .color-toolbar {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .color-box {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid #ddd;
            transition: 0.2s;
        }

        .color-box:hover {
            transform: scale(1.15);
            border: 2px solid #000;
        } 
    </style>
</head>

<body>

<div class="header">
    <img id="logoImg" src="logo.png" class="logo">

    <div class="header-text">

        <h3>
            BASIC AUTOMOTIVE TECHNOLOGY
        </h3>

        <div class="input-row">
            <div class="label">NAMA PEMATERI</div>
            <div class="colon">:</div>
            <div contenteditable="true" class="input-block" id="pemateri"></div>
        </div>

        <div class="input-row">
            <div class="label">NAMA PESERTA</div>
            <div class="colon">:</div>
            <div contenteditable="true" class="input-block" id="peserta"></div>
        </div>

        <div class="input-row">
            <div class="label">ID</div>
            <div class="colon">:</div>
            <div contenteditable="true" class="input-block" id="idPeserta"></div>
        </div>

        <div class="input-row">
            <div class="label">TANGGAL</div>
            <div class="colon">:</div>
            <div contenteditable="true" class="input-block" id="tanggal"></div>
        </div>

    </div>
</div>
<div style="display:flex; align-items:center; gap:10px; margin:10px 0;">
    <span>TEXT EDITING</span>
<div class="color-toolbar">

    <div class="color-box" style="background:#000000" onclick="setWarna('#000000')"></div>
    <div class="color-box" style="background:#ff0000" onclick="setWarna('#ff0000')"></div>
    <div class="color-box" style="background:#00ff00" onclick="setWarna('#00ff00')"></div>
    <div class="color-box" style="background:#0000ff" onclick="setWarna('#0000ff')"></div>
    <div class="color-box" style="background:#ffff00" onclick="setWarna('#ffff00')"></div>
    <div class="color-box" style="background:#ff00ff" onclick="setWarna('#ff00ff')"></div>
    <div class="color-box" style="background:#00ffff" onclick="setWarna('#00ffff')"></div>

</div>
</div>
<div id="materiContainer">

    <h2 contenteditable="true" class="judul">WHEEL ALIGNMENT</h2>

    <img src="./Steering02.png" class="gambarMateri" style="max-width:100%; margin:10px 0;">

    <div class="keterangan-gambar">

        <div class="ket-item">
            <span class="nomor">1.</span>
            <div contenteditable="true" class="ket-text"></div>
        </div>

        <div class="ket-item">
            <span class="nomor">2.</span>
            <div contenteditable="true" class="ket-text"></div>
        </div>

    </div>

    <div contenteditable="true" class="isiMateri">
        Pengaturan kombinasi sudut-sudut pada roda yang besarnya harus memenuhi persyaratan tertentu, agar:

        • Kendaraan berjalan lebih stabil
        • Mudah dikendalikan
        • Mengurangi keausan ban
    </div>

</div>

<button id="btnDownload" onclick="download()">DOWNLOAD</button>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>

function setWarna(c){
    warnaAktif = c;
}
let warnaAktif = "black";

// ambil semua contenteditable
function applyColor(el){
    el.style.color = warnaAktif;
}

// event global untuk semua contenteditable
document.addEventListener("input", function(e){
    if(e.target.isContentEditable){
        e.target.style.color = warnaAktif;
    }
});
function ambilWarnaText(el){
    let style = window.getComputedStyle(el);
    let rgb = style.color.match(/\d+/g);
    return [
        parseInt(rgb[0]),
        parseInt(rgb[1]),
        parseInt(rgb[2])
    ];
}   
function resetWarna(doc){
    doc.setTextColor(0,0,0);
}
async function download(){
    let btn = document.getElementById("btnDownload");

    btn.innerHTML = "Processing ⏳";
    btn.classList.add("loading");
    btn.disabled = true;

    setTimeout(async () => {

        const { jsPDF } = window.jspdf;
        let doc = new jsPDF();

        let pageHeight = doc.internal.pageSize.height;
        let marginLeft = 20;
        let marginTop = 20;
        let lineHeight = 6;
        let y = 50;

        // DATA
        let pemateriEl = document.getElementById("pemateri");
        let pesertaEl = document.getElementById("peserta");
        let idEl = document.getElementById("idPeserta");
        let tanggalEl = document.getElementById("tanggal");

        let pemateri = pemateriEl.innerText || "-";
        let peserta = pesertaEl.innerText || "-";
        let idPeserta = idEl.innerText || "-";
        let tanggal = tanggalEl.innerText || "-";

        let warnaPemateri = ambilWarnaText(pemateriEl);
        let warnaPeserta = ambilWarnaText(pesertaEl);
        let warnaId = ambilWarnaText(idEl);
        let warnaTanggal = ambilWarnaText(tanggalEl);

        doc.setTextColor(0,0,0);

        let startX = 45;
        let colonX = 95;
        let valueX = 100;

        doc.text("NAMA PEMATERI", startX, 15);
        doc.text(":", colonX, 15);

        doc.text("NAMA PESERTA", startX, 22);
        doc.text(":", colonX, 22);

        doc.text("ID", startX, 29);
        doc.text(":", colonX, 29);

        doc.text("TANGGAL", startX, 36);
        doc.text(":", colonX, 36);

        // isi pakai warna masing-masing
        doc.setTextColor(...warnaPemateri);
        doc.text(pemateri, valueX, 15);

        doc.setTextColor(...warnaPeserta);
        doc.text(peserta, valueX, 22);

        doc.setTextColor(...warnaId);
        doc.text(idPeserta, valueX, 29);

        doc.setTextColor(...warnaTanggal);
        doc.text(tanggal, valueX, 36);
        // LOGO
        let logo = document.getElementById("logoImg");
        if (logo) {
            doc.addImage(logo, "PNG", 10, 10, 25, 25);
        }

        doc.setTextColor(0,0,0);
        doc.setFontSize(14);
        doc.text("BASIC AUTOMOTIVE TECHNOLOGY", 105, 8, { align: "center" });

        doc.setFontSize(11);

        y +=-5;
        doc.line(15, y, 195, y);
        y += 10;

        let container = document.getElementById("materiContainer"); //INI YANG AKU TAMBAH
        let judulEl = container.querySelector(".judul");
        let isiEl = container.querySelector(".isiMateri");
        let img = container.querySelector(".gambarMateri");
        let ketItems = container.querySelectorAll(".ket-text");

        doc.setTextColor(0,0,0);
        resetWarna(doc); // ⬅️ TARUH DI SINI
        doc.setFont(undefined, "bold");
        doc.setFontSize(16);
        doc.text(judulEl.innerText, 105, y, { align: "center" });

        doc.setFont(undefined, "normal");
        y += 10;

        await new Promise(resolve => {
            if (img.complete) resolve();
            else img.onload = resolve;
        });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;

        ctx.drawImage(img, 0, 0);

        const imgData = canvas.toDataURL("image/png");

        let imgWidth = 170;
        let imgHeight = (img.naturalHeight / img.naturalWidth) * imgWidth;

        doc.addImage(imgData, "PNG", 20, y, imgWidth, imgHeight);

        y += imgHeight + 10;



        if(ketItems.length > 0){
            doc.setFont(undefined, "normal");
            doc.setFontSize(10); // balikin lagi ke normal
            doc.setTextColor(0,0,0);
            resetWarna(doc); // ⬅️ DI SINI
            y += 6;

ketItems.forEach((el, i) => {

    let text = el.innerText;
    let warna = ambilWarnaText(el);

    let nomor = `${i+1}. `; // angka tetap hitam

    let wrapped = doc.splitTextToSize(text, 150); // khusus isi teks saja

    wrapped.forEach((l, index) => {

        if (y > pageHeight - 20) {
            doc.addPage();
            y = marginTop;
        }

        if(index === 0){
            // 🔥 baris pertama: ada nomor + teks

            doc.setTextColor(0,0,0); // nomor hitam
            doc.text(nomor, marginLeft, y);

            doc.setTextColor(...warna); // teks berwarna
            doc.text(l, marginLeft + 10, y); // geser dikit
        } else {
            // 🔥 baris lanjutan (tanpa nomor)

            doc.setTextColor(...warna);
            doc.text(l, marginLeft + 10, y);
        }

        y += lineHeight;
    });
});

        y += 5; 

        }
        let isi = isiEl.innerText;

        let lines = doc.splitTextToSize(isi, 170);

        lines.forEach(line => {

            if (y > pageHeight - 20) {
                doc.addPage();
                y = marginTop;
            }

            doc.setTextColor(0,0,0);
            doc.text(line, marginLeft, y);
            y += lineHeight;
        });
        // TEXT
        doc.setFontSize(11);
        doc.setTextColor(0,0,0);

        // SAVE
        let fileName = judulEl.innerText.toLowerCase().replace(/\s+/g, "-");
        doc.save(fileName + ".pdf");

        btn.innerHTML = "DOWNLOAD";
        btn.classList.remove("loading");
        btn.disabled = false;

    }, 300);
}
</script>

</body>
</html>
