<!DOCTYPE html>
<html>
<head>
    <title>Latihan Materi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            line-height: 1.6;
        }

        .input-inline {
            display: inline-block;
            border-bottom: 1px dotted black;
            min-width: 200px;
            padding: 2px 5px;
            outline: none;
        }

        button {
    padding: 12px;
    width: 100%;
    background-color: #4CAF50; /* hijau */
    color: white;
    border: none;
    border-radius: 5px;
    font-weight: bold;
        }
    </style>
</head>

<body>

<h2>STEERING SYSTEM</h2>

<p>
Steering system (sistem kemudi) adalah sistem pada kendaraan yang berfungsi untuk mengontrol 
<span contenteditable="true" class="input-inline"></span> 
membelokkan roda, biasanya roda depan, sesuai keinginan pengemudi.
</p>

<button onclick="download()">DOWNLOAD MATERI</button>

<script>
<script>
async function download() {
    const { jsPDF } = window.jspdf;

    let doc = new jsPDF();

    let judul = document.querySelector("h2").innerText;
    let jawaban = document.querySelector(".input-inline").innerText;

    // 🖼️ LOGO (gunakan URL gambar)
    let logo = "https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg";

    // tambah logo
    doc.addImage(logo, "PNG", 10, 10, 20, 20);

    // judul
    doc.setFontSize(14);
    doc.text(judul, 40, 20);

    // isi
    doc.setFontSize(12);
    doc.text(
        "Steering system (sistem kemudi) adalah sistem pada kendaraan yang berfungsi untuk mengontrol " 
        + jawaban + 
        " membelokkan roda, biasanya roda depan, sesuai keinginan pengemudi.",
        10,
        50
    );

    doc.save("hasil.pdf");
}
</script>
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
