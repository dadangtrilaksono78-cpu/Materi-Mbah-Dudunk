<!DOCTYPE html>
<html>
<head>
    <title>Latihan Materi Lengkap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }

        h2 { text-align: center; }

        .input-inline {
            display: inline-block;
            border-bottom: 1px dotted black;
            min-width: 200px;
            padding: 2px 5px;
            outline: none;
        }

        .label-box {
            position: absolute;
            background: rgba(255,255,255,0.7);
            border: 1px solid #000;
            padding: 2px 5px;
            min-width: 50px;
        }

        button {
            padding: 12px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>STEERING SYSTEM</h2>

<p>
Steering system (sistem kemudi) adalah 
<span contenteditable="true" class="input-inline"></span>, 
dan juga memiliki fungsi untuk mempermudah pengendalian kendaraan.
</p>

<p>
Selain itu, sistem kemudi juga berperan dalam 
<span contenteditable="true" class="input-inline"></span> 
dan menjaga stabilitas kendaraan saat melaju.
</p>

<div style="position: relative;">
    <img id="gambarMateri"
    src="https://raw.githubusercontent.com/dadangtrilaksono78-cpu/Materi-Mbah-Dudunk/main/Steering02.png"
    width="100%" crossorigin="anonymous">

    <!-- Label di gambar -->
    <span contenteditable="true" class="label-box" style="top:20px; left:30px;"></span>
    <span contenteditable="true" class="label-box" style="top:80px; left:150px;"></span>
    <span contenteditable="true" class="label-box" style="top:140px; left:80px;"></span>
</div>

<p><b>Identifikasi Komponen:</b></p>

<ol>
<li><span contenteditable="true" class="input-inline"></span></li>
<li><span contenteditable="true" class="input-inline"></span></li>
<li><span contenteditable="true" class="input-inline"></span></li>
<li><span contenteditable="true" class="input-inline"></span></li>
</ol>

<p><b>WARNA TEXT:</b></p>
<input type="color" onchange="warna(this.value)">

<button onclick="download()">DOWNLOAD</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let warnaAktif = "#000000";
const inputs = document.querySelectorAll(".input-inline");

inputs.forEach(i => i.style.color = warnaAktif);

function warna(c){
    warnaAktif = c;
    inputs.forEach(i => i.style.color = warnaAktif);
}

inputs.forEach(input=>{
    input.addEventListener("input", function(){
        this.style.color = warnaAktif;
    });
});

function hexToRgb(hex){
    hex = hex.replace("#","");
    return [
        parseInt(hex.substring(0,2),16),
        parseInt(hex.substring(2,4),16),
        parseInt(hex.substring(4,6),16)
    ];
}

// fungsi tulis
function tulis(doc, teks, x, y, maxWidth, rgb){
    doc.setTextColor(...rgb);
    const lines = doc.splitTextToSize(teks, maxWidth);
    lines.forEach(line=>{
        doc.text(line, x, y);
        y += 7;
    });
    return y;
}

function download(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    const margin = 20;
    let y = 50;
    const lebar = doc.internal.pageSize.getWidth();

    // HEADER
    doc.setFontSize(14);
    doc.text("STEERING SYSTEM", lebar/2, 20, {align:"center"});
    doc.line(margin,25,lebar-margin,25);

    // PARAGRAF
    const paragraphs = document.querySelectorAll("p");
    let jawaban = document.querySelectorAll(".input-inline");
    let index = 0;

    paragraphs.forEach(p=>{
        let nodes = p.childNodes;
        nodes.forEach(n=>{
            if(n.nodeType === 3){
                y = tulis(doc, n.textContent, margin, y, lebar-40, [0,0,0]);
            }else if(n.classList && n.classList.contains("input-inline")){
                let teks = jawaban[index].innerText || "-";
                let rgb = hexToRgb(jawaban[index].style.color || "#000000");
                y = tulis(doc, teks, margin, y, lebar-40, rgb);
                index++;
            }
        });
        y += 5;
    });

    // LIST
    let list = document.querySelectorAll("ol li");
    list.forEach((li,i)=>{
        let isi = li.innerText || "-";
        y = tulis(doc, (i+1)+". "+isi, margin, y, lebar-40, [0,0,0]);
    });

    // GAMBAR
    let img = document.getElementById("gambarMateri");
    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img,0,0);

    let data = canvas.toDataURL("image/png");

    doc.addPage();
    doc.addImage(data,"PNG",20,20,170,90);

    doc.save("STEERING_SYSTEM.pdf");
}
</script>

</body>
</html>
