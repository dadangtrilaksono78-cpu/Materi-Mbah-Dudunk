<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materi Otomotif</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* Splash */
#splash {
    position:fixed;
    width:100%;
    height:100%;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    z-index:10;
}

header {
    padding:15px;
    text-align:center;
    background:#020617;
}

.container {
    padding:20px;
    padding-bottom:80px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.card {
    background:#1e293b;
    border-radius:15px;
    padding:15px;
    text-align:center;
    text-decoration:none;
    color:white;
}

.icon {
    font-size:30px;
    margin-bottom:10px;
}

/* Navbar */
.navbar {
    position:fixed;
    bottom:0;
    width:100%;
    background:#020617;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
}

.nav-item {
    color:#94a3b8;
    text-decoration:none;
}

.nav-item.active {
    color:#3b82f6;
}
</style>
</head>

<body>

<div id="splash">Loading...</div>

<header>Materi Otomotif</header>

<div class="container">
<div class="grid">

<a href="materi/wheel-alignment/" class="card">
<div class="icon">🛞</div>
Wheel Alignment
</a>

<a href="materi/steering-system/" class="card">
<div class="icon">🎯</div>
Steering System
</a>

<a href="materi/brake-system/" class="card">
<div class="icon">🛑</div>
Brake System
</a>

<a href="materi/electric-system/" class="card">
<div class="icon">⚡</div>
Electric System
</a>

</div>
</div>

<div class="navbar">
<a href="index.html" class="nav-item active">🏠</a>
<a href="#" class="nav-item">📚</a>
<a href="#" class="nav-item">📝</a>
<a href="#" class="nav-item">👤</a>
</div>

<script>
// FIX splash biar gak nyangkut
window.onload = function(){
    setTimeout(()=>{
        document.getElementById('splash').style.display='none';
    },1000);
}
</script>

</body>
</html>
