<!DOCTYPE html>
<html>
<head>
    <title>Latihan Materi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            line-height: 1.6;
        }

        .input-inline {
            display: inline-block;
            border-bottom: 1px dotted black;
            min-width: 200px;
            padding: 2px 5px;
            outline: none;
        }

        button {
            padding: 12px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>STEERING SYSTEM</h2>

<p>
Steering system (sistem kemudi) adalah sistem pada kendaraan yang berfungsi untuk mengontrol 
<span contenteditable="true" class="input-inline"></span> 
membelokkan roda, biasanya roda depan, sesuai keinginan pengemudi.
</p>

<button onclick="download()">DOWNLOAD MATERI</button>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- Script utama -->
<script>
function download() {
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let judul = document.querySelector("h2").innerText;
    let jawaban = document.querySelector(".input-inline").innerText;
    let lebarHalaman = doc.internal.pageSize.getWidth();

    let teks = "Steering system (sistem kemudi) adalah sistem pada kendaraan yang berfungsi untuk mengontrol " 
               + jawaban + 
               " membelokkan roda, biasanya roda depan, sesuai keinginan pengemudi.";

    let splitText = doc.splitTextToSize(teks, 170);

    // 🖼️ LOAD LOGO (VERSI RINGAN)
    let img = new Image();
    img.src = "https://raw.githubusercontent.com/dadangtrilaksono78-cpu/Materi-Mbah-Dudunk/main/logo.png";

    img.onload = function () {
        doc.addImage(img, "PNG", 20, 10, 20, 20);
        lanjut();
    };
doc.addImage(img, "PNG", 20, 10, 20, 20);

// teks samping logo
doc.setFont(undefined, "bold");
doc.setFontSize(12);
doc.text("BASIC AUTOMOTIVE TECHNOLOGY", 45, 18);

doc.setFont(undefined, "normal");
doc.setFontSize(10);
doc.text("Materi Pelatihan Otomotif Dasar", 45, 24);
    img.onerror = function () {
        lanjut(); // tetap jalan walau logo gagal
    };

    function lanjut() {
        doc.setFontSize(16);
        doc.text(judul, lebarHalaman / 2, 35, { align: "center" });

        doc.line(20, 40, lebarHalaman - 20, 40);

        doc.text(splitText, 20, 50);

        doc.save("hasil.pdf");
    }
}
</script>

</body>
</html>
