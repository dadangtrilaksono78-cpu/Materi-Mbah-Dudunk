<!DOCTYPE html>
<html>
<head>
    <title>Latihan Materi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }
        h2 { text-align: center; }

        .input-inline {
            display: inline-block;
            border-bottom: 1px dotted black;
            min-width: 200px;
            padding: 2px 5px;
            outline: none;
        }

        button {
            padding: 12px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        button:not([onclick="download()"]) {
            width: auto;
            background-color: #555;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h2>STEERING SYSTEM</h2>

<p>
Steering system (sistem kemudi) adalah 
<span contenteditable="true" class="input-inline"></span> 
yang berfungsi untuk mengontrol arah gerak kendaraan dengan 
<span contenteditable="true" class="input-inline"></span>.
</p>

<img id="gambarMateri"
src="https://raw.githubusercontent.com/dadangtrilaksono78-cpu/Materi-Mbah-Dudunk/main/Steering01.png"
width="100%" crossorigin="anonymous">

<p><b>WARNA TEXT:</b></p>
<input type="color" onchange="warna(this.value)">

<button onclick="download()">DOWNLOAD</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let warnaAktif = "#000000"; // warna default
const inputs = document.querySelectorAll(".input-inline");

// ===== Set warna default inline agar selalu terbaca =====
inputs.forEach(input => input.style.color = warnaAktif);

// Fungsi untuk memilih warna
function warna(color){
    warnaAktif = color;
    inputs.forEach(input => input.style.color = warnaAktif);
}

// Pastikan setiap input update warna saat diketik
inputs.forEach(input => {
    input.addEventListener("input", function(){
        this.style.color = warnaAktif;
    });
});

// Konversi hex/rgb ke array RGB
function hexToRgb(value){
    if(!value) return [0,0,0];
    if(value.startsWith("rgb")){
        let nums = value.match(/\d+/g);
        return [parseInt(nums[0]), parseInt(nums[1]), parseInt(nums[2])];
    }
    value = value.replace(/^#/, '');
    if(value.length === 3) value = value.split('').map(c=>c+c).join('');
    return [
        parseInt(value.substring(0,2),16),
        parseInt(value.substring(2,4),16),
        parseInt(value.substring(4,6),16)
    ];
}

// Fungsi untuk menulis teks panjang dengan word wrap
function tulisTeksWrap(doc, teks, x, y, maxWidth, rgb) {
    doc.setTextColor(...rgb);
    const lines = doc.splitTextToSize(teks, maxWidth);
    lines.forEach((line, index) => {
        doc.text(line, x, y + (index*7)); // 7 = line height
    });
    return y + (lines.length*7); // posisi Y setelah teks
}

// Fungsi download PDF
function download(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    // Ambil teks & warna dari span, set default jika kosong
    let jawabanArray = [];
    inputs.forEach(inp => {
        let teks = inp.innerText.trim() || "-";
        if(!inp.style.color) inp.style.color = warnaAktif;
        jawabanArray.push({ teks: teks, rgb: hexToRgb(inp.style.color) });
    });

    function buatPDF(){
        const lebar = doc.internal.pageSize.getWidth();
        const margin = 20;
        let y = 50;

        // HEADER
        doc.setFont(undefined, "bold");
        doc.setFontSize(12);
        doc.text("BASIC AUTOMOTIVE TECHNOLOGY", 45, 18);
        doc.setFont(undefined, "normal");
        doc.setFontSize(10);
        doc.text("Materi Pelatihan Otomotif Dasar", 45, 24);
        doc.setFontSize(16);
        doc.text("STEERING SYSTEM", lebar/2, 35, {align:"center"});
        doc.line(margin, 40, lebar - margin, 40);

        // TEKS
        doc.setFontSize(12);
        const teks1 = "Steering system (sistem kemudi) adalah ";
        doc.setTextColor(0,0,0);
        y = tulisTeksWrap(doc, teks1, margin, y, lebar - 2*margin, [0,0,0]);

        // Jawaban pertama
        y = tulisTeksWrap(doc, jawabanArray[0].teks, margin + doc.getTextWidth(teks1), y - 7, lebar - 2*margin, jawabanArray[0].rgb);

        // Teks kedua
        const teks2 = " yang berfungsi untuk mengontrol arah gerak kendaraan dengan ";
        y = tulisTeksWrap(doc, teks2, margin + doc.getTextWidth(teks1 + jawabanArray[0].teks), y - 7, lebar - 2*margin, [0,0,0]);

        // Jawaban kedua
        y = tulisTeksWrap(doc, jawabanArray[1].teks, margin + doc.getTextWidth(teks1 + jawabanArray[0].teks + teks2), y - 7, lebar - 2*margin, jawabanArray[1].rgb);

        // Titik
        y = tulisTeksWrap(doc, ".", margin + doc.getTextWidth(teks1 + jawabanArray[0].teks + teks2 + jawabanArray[1].teks), y - 7, lebar - 2*margin, [0,0,0]);

        // GAMBAR
        const gambar = document.getElementById("gambarMateri");
        try {
            let canvas = document.createElement("canvas");
            let ctx = canvas.getContext("2d");
            canvas.width = gambar.naturalWidth;
            canvas.height = gambar.naturalHeight;
            ctx.drawImage(gambar, 0, 0);
            let imgData = canvas.toDataURL("image/png");
            doc.addImage(imgData, "PNG", margin, y + 10, lebar - 2*margin, 90);
        } catch(e){ console.log("gambar gagal"); }

        doc.save("STEERING SYSTEM.pdf");
    }

    // LOGO
    let logo = new Image();
    logo.crossOrigin = "Anonymous";
    logo.src = "https://raw.githubusercontent.com/dadangtrilaksono78-cpu/Materi-Mbah-Dudunk/main/logo.png";
    logo.onload = function(){
        doc.addImage(logo, "PNG", 20, 10, 20, 20, undefined, "FAST");
        buatPDF();
    }
    logo.onerror = function(){
        buatPDF();
    }
}
</script>

</body>
</html>
