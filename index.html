<!DOCTYPE html>
<html>
<head>
    <title>Latihan Materi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }
        h2 { text-align: center; }

        .input-inline {
            display: inline-block;
            border-bottom: 1px dotted black;
            min-width: 200px;
            padding: 2px 5px;
            outline: none;
        }

        .form-box input {
            width: 100%;
            margin-bottom: 5px;
            padding: 5px;
        }

        button {
            padding: 12px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        button:not([onclick="download()"]) {
            width: auto;
            background-color: #555;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h2>STEERING SYSTEM</h2>

<div class="form-box">
    <label>Nama :</label>
    <input type="text" id="nama">

    <label>NRP :</label>
    <input type="text" id="nrp">

    <label>Jabatan :</label>
    <input type="text" id="jabatan">
</div>

<p>
Steering system (sistem kemudi) adalah 
<span contenteditable="true" class="input-inline"></span> 
yang berfungsi untuk mengontrol arah gerak kendaraan dengan cara membelokkan roda.
</p>

<img id="gambarMateri"
src="https://raw.githubusercontent.com/dadangtrilaksono78-cpu/Materi-Mbah-Dudunk/main/Steering01.png"
width="100%" crossorigin="anonymous">

<button onclick="download()">DOWNLOAD</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const input = document.querySelector(".input-inline");

function download(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let nama = document.getElementById("nama").value || "-";
    let nrp = document.getElementById("nrp").value || "-";
    let jabatan = document.getElementById("jabatan").value || "-";

    let jawaban = input.innerText || "-";

    let teksAwal = "Steering system (sistem kemudi) adalah ";
    let teksAkhir = " yang berfungsi untuk mengontrol arah gerak kendaraan dengan cara membelokkan roda.";

    function buatPDF(){

        let lebar = doc.internal.pageSize.getWidth();

        // ===== LOGO =====
        doc.addImage(logo, "PNG", 20, 10, 20, 20);

        // ===== HEADER =====
        doc.setFont(undefined, "bold");
        doc.setFontSize(12);
        doc.text("BASIC AUTOMOTIVE TECHNOLOGY", 45, 18);

        doc.setFont(undefined, "normal");
        doc.setFontSize(10);
        doc.text("Materi Pelatihan Otomotif Dasar", 45, 24);

        doc.setFontSize(16);
        doc.text("STEERING SYSTEM", lebar/2, 35, {align:"center"});

        // ===== IDENTITAS =====
        doc.setFontSize(10);
        doc.text(`Nama : ${nama}`, lebar - 20, 15, {align:"right"});
        doc.text(`NRP : ${nrp}`, lebar - 20, 21, {align:"right"});
        doc.text(`Jabatan : ${jabatan}`, lebar - 20, 27, {align:"right"});

        doc.line(20, 40, lebar-20, 40);

        // ===== PARAGRAF JUSTIFY =====
        let fullText = teksAwal + jawaban + teksAkhir;

        doc.setFontSize(12);
        doc.setTextColor(0,0,0);

        doc.text(fullText, 20, 50, {
            maxWidth: 170,
            align: "justify",
            lineHeightFactor: 1.5
        });

        // ===== GAMBAR =====
        let gambar = document.getElementById("gambarMateri");

        try {
            let canvas = document.createElement("canvas");
            let ctx = canvas.getContext("2d");

            canvas.width = gambar.naturalWidth;
            canvas.height = gambar.naturalHeight;

            ctx.drawImage(gambar, 0, 0);

            let imgData = canvas.toDataURL("image/png");

            doc.addImage(imgData, "PNG", 20, 90, 170, 90);
        } catch(e){}

        doc.save("STEERING SYSTEM.pdf");
    }

    // ===== LOAD LOGO =====
    let logo = new Image();
    logo.src = "https://raw.githubusercontent.com/dadangtrilaksono78-cpu/Materi-Mbah-Dudunk/main/logo.png";

    logo.onload = function(){
        buatPDF();
    };

    logo.onerror = function(){
        buatPDF();
    };
}
</script>

</body>
</html>
