<!DOCTYPE html>
<html>
<head>
    <title>Latihan Materi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }
        h2 { text-align: center; }

        .input-inline {
            display: inline-block;
            border-bottom: 1px dotted black;
            min-width: 200px;
            padding: 2px 5px;
            outline: none;
        }

        button {
            padding: 12px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        button:not([onclick="download()"]) {
            width: auto;
            background-color: #555;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h2>STEERING SYSTEM</h2>

<p>
Steering system (sistem kemudi) adalah 
<span contenteditable="true" class="input-inline"></span> 
yang berfungsi untuk mengontrol arah gerak kendaraan dengan cara membelokkan roda.
</p>

<img id="gambarMateri"
src="https://raw.githubusercontent.com/dadangtrilaksono78-cpu/Materi-Mbah-Dudunk/main/Steering01.png"
width="100%">

<p><b>Pilih Warna:</b></p>

<button onclick="warna('red')" style="background:red">Red</button>
<button onclick="warna('blue')" style="background:blue">Blue</button>
<button onclick="warna('black')" style="background:black">Black</button>
<input type="color" onchange="warna(this.value)">

<button onclick="download()">DOWNLOAD</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let warnaAktif = "black";
const input = document.querySelector(".input-inline");

function warna(color){
    warnaAktif = color;
}

input.addEventListener("input", function(){
    this.style.color = warnaAktif;
});

// HEX → RGB
function hexToRgb(hex){
    if(hex === "red") return [255,0,0];
    if(hex === "blue") return [0,0,255];
    if(hex === "black") return [0,0,0];

    hex = hex.replace("#","");
    let r = parseInt(hex.substring(0,2),16);
    let g = parseInt(hex.substring(2,4),16);
    let b = parseInt(hex.substring(4,6),16);

    return [r,g,b];
}

function download(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let jawaban = input.innerText;

    let warnaText = input.style.color || "black";
    let rgb = hexToRgb(warnaText);

    let teksAwal = "Steering system (sistem kemudi) adalah ";
    let teksJawaban = jawaban;
    let teksAkhir = " yang berfungsi untuk mengontrol arah gerak kendaraan dengan cara membelokkan roda.";

    let fullText = teksAwal + teksJawaban + teksAkhir;

    let margin = 20;
    let maxWidth = 170;

    let lines = doc.splitTextToSize(fullText, maxWidth);

    let y = 50;

    doc.setFontSize(12);

    lines.forEach(line => {
        let x = margin;

        // cek posisi jawaban di baris ini
        let indexAwal = line.indexOf(teksJawaban);

        if(indexAwal !== -1){
            let sebelum = line.substring(0, indexAwal);
            let tengah = teksJawaban;
            let sesudah = line.substring(indexAwal + tengah.length);

            // sebelum (hitam)
            doc.setTextColor(0,0,0);
            doc.text(sebelum, x, y);
            x += doc.getTextWidth(sebelum);

            // jawaban (warna)
            doc.setTextColor(rgb[0], rgb[1], rgb[2]);
            doc.text(tengah, x, y);
            x += doc.getTextWidth(tengah);

            // sesudah (hitam)
            doc.setTextColor(0,0,0);
            doc.text(sesudah, x, y);

        } else {
            doc.setTextColor(0,0,0);
            doc.text(line, x, y);
        }

        y += 7;
    });

    // GAMBAR
    let gambar = document.getElementById("gambarMateri");

    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");

    canvas.width = gambar.naturalWidth;
    canvas.height = gambar.naturalHeight;

    ctx.drawImage(gambar, 0, 0);

    let imgData = canvas.toDataURL("image/png");

    doc.addImage(imgData, "PNG", 20, y + 10, 170, 90);

    doc.save("STEERING SYSTEM.pdf");
}
</script>

</body>
</html>
