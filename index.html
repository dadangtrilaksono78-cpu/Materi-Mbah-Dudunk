<!DOCTYPE html>
<html>
<head>
    <title>Latihan Materi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }
        h2 { text-align: center; }

        .input-inline {
            display: inline-block;
            border-bottom: 1px dotted black;
            min-width: 200px;
            padding: 2px 5px;
            outline: none;
        }

        button {
            padding: 12px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        button:not([onclick="download()"]) {
            width: auto;
            background-color: #555;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h2>STEERING SYSTEM</h2>

<p>
Steering system (sistem kemudi) adalah 
<span contenteditable="true" class="input-inline"></span> 
yang berfungsi untuk mengontrol arah gerak kendaraan dengan 
<span contenteditable="true" class="input-inline"></span>.
</p>

<img id="gambarMateri"
src="https://raw.githubusercontent.com/dadangtrilaksono78-cpu/Materi-Mbah-Dudunk/main/Steering01.png"
width="100%" crossorigin="anonymous">

<p><b>WARNA TEXT:</b></p>
<input type="color" onchange="warna(this.value)">

<button onclick="download()">DOWNLOAD</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let warnaAktif = "#000000";
const inputs = document.querySelectorAll(".input-inline");
inputs.forEach(input => input.style.color = warnaAktif);

function warna(color){
    warnaAktif = color;
    inputs.forEach(input => input.style.color = warnaAktif);
}

inputs.forEach(input => {
    input.addEventListener("input", function(){
        this.style.color = warnaAktif;
    });
});

function hexToRgb(value){
    if(!value) return [0,0,0];
    if(value.startsWith("rgb")){
        let nums = value.match(/\d+/g);
        return [parseInt(nums[0]),parseInt(nums[1]),parseInt(nums[2])];
    }
    value = value.replace(/^#/, '');
    if(value.length === 3) value = value.split('').map(c=>c+c).join('');
    return [
        parseInt(value.substring(0,2),16),
        parseInt(value.substring(2,4),16),
        parseInt(value.substring(4,6),16)
    ];
}

// Fungsi tulis teks dengan word wrap dan page break otomatis
function tulisTeks(doc, teks, x, y, maxWidth, rgb, lineHeight){
    doc.setTextColor(...rgb);
    const pageHeight = doc.internal.pageSize.getHeight();
    const lines = doc.splitTextToSize(teks, maxWidth);
    for(let i=0; i<lines.length; i++){
        if(y + lineHeight > pageHeight - 20){ // margin bawah
            doc.addPage();
            y = 20; // margin atas
        }
        doc.text(lines[i], x, y);
        y += lineHeight;
    }
    return y;
}

function download(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    // Ambil semua jawaban
    let jawabanArray = [];
    inputs.forEach(inp => {
        let teks = inp.innerText.trim() || "-";
        if(!inp.style.color) inp.style.color = warnaAktif;
        jawabanArray.push({teks: teks, rgb: hexToRgb(inp.style.color)});
    });

    function buatPDF(){
        const lebar = doc.internal.pageSize.getWidth();
        const margin = 20;
        let y = 50;
        const lineHeight = 7;

        // HEADER
        doc.setFont(undefined,"bold");
        doc.setFontSize(12);
        doc.text("BASIC AUTOMOTIVE TECHNOLOGY", 45, 18);
        doc.setFont(undefined,"normal");
        doc.setFontSize(10);
        doc.text("Materi Pelatihan Otomotif Dasar", 45, 24);
        doc.setFontSize(16);
        doc.text("STEERING SYSTEM", lebar/2, 35, {align:"center"});
        doc.line(margin, 40, lebar-margin, 40);

        // TEKS
        const teks1 = "Steering system (sistem kemudi) adalah ";
        y = tulisTeks(doc, teks1, margin, y, lebar - 2*margin, [0,0,0], lineHeight);
        y = tulisTeks(doc, jawabanArray[0].teks, margin + doc.getTextWidth(teks1), y-lineHeight, lebar - 2*margin, jawabanArray[0].rgb, lineHeight);
        const teks2 = " yang berfungsi untuk mengontrol arah gerak kendaraan dengan ";
        y = tulisTeks(doc, teks2, margin + doc.getTextWidth(teks1 + jawabanArray[0].teks), y-lineHeight, lebar - 2*margin, [0,0,0], lineHeight);
        y = tulisTeks(doc, jawabanArray[1].teks, margin + doc.getTextWidth(teks1 + jawabanArray[0].teks + teks2), y-lineHeight, lebar - 2*margin, jawabanArray[1].rgb, lineHeight);
        y = tulisTeks(doc, ".", margin + doc.getTextWidth(teks1 + jawabanArray[0].teks + teks2 + jawabanArray[1].teks), y-lineHeight, lebar - 2*margin, [0,0,0], lineHeight);

        // GAMBAR
        const gambar = document.getElementById("gambarMateri");
        try{
            let canvas = document.createElement("canvas");
            let ctx = canvas.getContext("2d");
            canvas.width = gambar.naturalWidth;
            canvas.height = gambar.naturalHeight;
            ctx.drawImage(gambar,0,0);
            let imgData = canvas.toDataURL("image/png");
            if(y + 90 > doc.internal.pageSize.getHeight() - margin){
                doc.addPage();
                y = 20;
            }
            doc.addImage(imgData,"PNG",margin,y,lebar-2*margin,90);
        }catch(e){console.log("gambar gagal");}

        doc.save("STEERING SYSTEM.pdf");
    }

    let logo = new Image();
    logo.crossOrigin = "Anonymous";
    logo.src = "https://raw.githubusercontent.com/dadangtrilaksono78-cpu/Materi-Mbah-Dudunk/main/logo.png";
    logo.onload = function(){
        doc.addImage(logo,"PNG",20,10,20,20,undefined,"FAST");
        buatPDF();
    }
    logo.onerror = function(){
        buatPDF();
    }
}
</script>

</body>
</html>
