<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materi Otomotif</title>

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: #0f172a;
        color: white;
    }

    header {
        padding: 20px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        background: #020617;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .container {
        padding: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 20px;
    }

    .card {
        background: linear-gradient(145deg, #1e293b, #020617);
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        text-decoration: none;
        color: white;
        box-shadow: 0 0 15px rgba(0,255,255,0.1);
        transition: 0.3s;
        position: relative;
        overflow: hidden;
    }

    .card::before {
        content: "";
        position: absolute;
        width: 100px;
        height: 100px;
        background: rgba(0,255,255,0.2);
        border-radius: 50%;
        top: -30px;
        right: -30px;
        transition: 0.5s;
    }

    .card:hover::before {
        transform: scale(2);
    }

    .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 0 25px rgba(0,255,255,0.4);
    }

    .icon {
        font-size: 40px;
        margin-bottom: 10px;
    }

    .title {
        font-size: 14px;
        font-weight: 600;
    }

    .badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #22c55e;
        color: black;
        font-size: 10px;
        padding: 4px 7px;
        border-radius: 10px;
        font-weight: bold;
    }

    footer {
        text-align: center;
        padding: 15px;
        font-size: 12px;
        color: #94a3b8;
    }
</style>
</head>

<body>

<header>
    ⚡ MATERI OTOMOTIF MODERN
</header>

<div class="container">

    <div class="grid">

        <a href="materi/wheel-alignment/" class="card">
            <div class="icon">🛞</div>
            <div class="title">Wheel Alignment</div>
        </a>

        <a href="materi/steering-system/" class="card">
            <div class="icon">🎯</div>
            <div class="title">Steering System</div>
        </a>

        <a href="materi/brake-system/" class="card">
            <div class="icon">🛑</div>
            <div class="title">Brake System</div>
        </a>

        <a href="materi/electric-system/" class="card">
            <div class="icon">⚡</div>
            <div class="title">Electric System</div>
            <div class="badge">NEW</div>
        </a>

    </div>

</div>

<footer>
    © 2026 Materi Mbah Dudunk
</footer>

</body>
</html>
