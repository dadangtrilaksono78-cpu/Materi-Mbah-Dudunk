<!DOCTYPE html>
<html>
<head>
    <title>Latihan Materi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }
        h2 { text-align: center; }

        .input-inline {
            display: inline-block;
            border-bottom: 1px dotted black;
            min-width: 200px;
            padding: 2px 5px;
            outline: none;
        }

        button {
            padding: 12px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        button:not([onclick="download()"]) {
            width: auto;
            background-color: #555;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h2>STEERING SYSTEM</h2>

<p>
Steering system (sistem kemudi) adalah 
<span contenteditable="true" class="input-inline"></span> 
yang berfungsi untuk mengontrol arah gerak kendaraan dengan cara membelokkan roda.
</p>

<img id="gambarMateri"
src="https://raw.githubusercontent.com/dadangtrilaksono78-cpu/Materi-Mbah-Dudunk/main/Steering01.png"
width="100%" crossorigin="anonymous">

<p><b>WARNA TEXT:</b></p>

<input type="color" onchange="warna(this.value)">

<button onclick="download()">DOWNLOAD</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let warnaAktif = "black";
const input = document.querySelector(".input-inline");

function warna(color){
    warnaAktif = color;
}

input.addEventListener("input", function(){
    this.style.color = warnaAktif;
});

function hexToRgb(hex){
    if(hex === "red") return [255,0,0];
    if(hex === "blue") return [0,0,255];
    if(hex === "black") return [0,0,0];

    hex = hex.replace("#","");
    return [
        parseInt(hex.substring(0,2),16),
        parseInt(hex.substring(2,4),16),
        parseInt(hex.substring(4,6),16)
    ];
}

function download(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let jawaban = input.innerText || "-";
    let warnaText = input.style.color || "black";
    let rgb = hexToRgb(warnaText);

    let teksAwal = "Steering system (sistem kemudi) adalah ";
    let teksAkhir = " yang berfungsi untuk mengontrol arah gerak kendaraan dengan cara membelokkan roda.";

    function buatPDF(){

        let lebar = doc.internal.pageSize.getWidth();

        // ===== HEADER =====
        doc.setFont(undefined, "bold");
        doc.setFontSize(12);
        doc.text("BASIC AUTOMOTIVE TECHNOLOGY", 45, 18);

        doc.setFont(undefined, "normal");
        doc.setFontSize(10);
        doc.text("Materi Pelatihan Otomotif Dasar", 45, 24);

        doc.setFontSize(16);
        doc.text("STEERING SYSTEM", lebar/2, 35, {align:"center"});

        doc.line(20, 40, lebar-20, 40);

        // ===== TEKS =====
        let fullText = teksAwal + jawaban + teksAkhir;
        let lines = doc.splitTextToSize(fullText, 170);

        let y = 50;
        doc.setFontSize(12);

        lines.forEach(line => {
            let x = 20;
            let index = line.indexOf(jawaban);

            if(index !== -1){
                let sebelum = line.substring(0, index);
                let sesudah = line.substring(index + jawaban.length);

                doc.setTextColor(0,0,0);
                doc.text(sebelum, x, y);
                x += doc.getTextWidth(sebelum);

                doc.setTextColor(rgb[0], rgb[1], rgb[2]);
                doc.text(jawaban, x, y);
                x += doc.getTextWidth(jawaban);

                doc.setTextColor(0,0,0);
                doc.text(sesudah, x, y);
            } else {
                doc.setTextColor(0,0,0);
                doc.text(line, x, y);
            }

            y += 7;
        });

        // ===== GAMBAR MATERI =====
        let gambar = document.getElementById("gambarMateri");

        try {
            let canvas = document.createElement("canvas");
            let ctx = canvas.getContext("2d");

            canvas.width = gambar.naturalWidth;
            canvas.height = gambar.naturalHeight;

            ctx.drawImage(gambar, 0, 0);

            let imgData = canvas.toDataURL("image/png");

            doc.addImage(imgData, "PNG", 20, y + 10, 170, 90);
        } catch(e){
            console.log("gambar gagal");
        }

        doc.save("STEERING SYSTEM.pdf");
    }

    // ===== LOGO =====
    let logo = new Image();
    logo.crossOrigin = "Anonymous";
    logo.src = "https://raw.githubusercontent.com/dadangtrilaksono78-cpu/Materi-Mbah-Dudunk/main/logo.png";

    logo.onload = function(){
        doc.addImage(logo, "PNG", 20, 10, 20, 20, undefined, "FAST");
        buatPDF();
    };

    logo.onerror = function(){
        buatPDF();
    };
}
</script>

</body>
</html>
