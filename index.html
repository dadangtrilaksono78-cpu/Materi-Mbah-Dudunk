<!DOCTYPE html>
<html>
<head>
    <title>Latihan Materi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }
        h2 { text-align: center; }

        .input-inline {
            display: inline-block;
            border-bottom: 1px dotted black;
            min-width: 200px;
            padding: 2px 5px;
            outline: none;
        }

        button {
            padding: 12px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        button:not([onclick="download()"]) {
            width: auto;
            background-color: #555;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h2>STEERING SYSTEM</h2>

<p>
Steering system (sistem kemudi) adalah 
<span contenteditable="true" class="input-inline"></span> 
yang berfungsi untuk mengontrol arah gerak kendaraan dengan 
<span contenteditable="true" class="input-inline"></span>.
</p>

<img id="gambarMateri"
src="https://raw.githubusercontent.com/dadangtrilaksono78-cpu/Materi-Mbah-Dudunk/main/Steering01.png"
width="100%" crossorigin="anonymous">

<p><b>WARNA TEXT:</b></p>
<input type="color" onchange="warna(this.value)">

<button onclick="download()">DOWNLOAD</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let warnaAktif = "black";
const inputs = document.querySelectorAll(".input-inline");

// Fungsi untuk pilih warna
function warna(color){
    warnaAktif = color;
    inputs.forEach(input => {
        input.style.color = warnaAktif;
    });
}

// Pasang event input ke semua span
inputs.forEach(input => {
    input.addEventListener("input", function(){
        this.style.color = warnaAktif;
    });
});

// Konversi hex ke RGB untuk jsPDF
function hexToRgb(hex){
    if(hex === "red") return [255,0,0];
    if(hex === "blue") return [0,0,255];
    if(hex === "black") return [0,0,0];

    hex = hex.replace("#","");
    return [
        parseInt(hex.substring(0,2),16),
        parseInt(hex.substring(2,4),16),
        parseInt(hex.substring(4,6),16)
    ];
}

// Fungsi download PDF
function download(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    // Ambil semua teks & warna dari span
    let jawabanArray = [];
    inputs.forEach(inp => {
        jawabanArray.push({
            teks: inp.innerText || "-",
            rgb: hexToRgb(inp.style.color || "black")
        });
    });

    function buatPDF(){
        let lebar = doc.internal.pageSize.getWidth();

        // ===== HEADER =====
        doc.setFont(undefined, "bold");
        doc.setFontSize(12);
        doc.text("BASIC AUTOMOTIVE TECHNOLOGY", 45, 18);

        doc.setFont(undefined, "normal");
        doc.setFontSize(10);
        doc.text("Materi Pelatihan Otomotif Dasar", 45, 24);

        doc.setFontSize(16);
        doc.text("STEERING SYSTEM", lebar/2, 35, {align:"center"});

        doc.line(20, 40, lebar-20, 40);

        // ===== TEKS =====
        let y = 50;
        doc.setFontSize(12);

        // Teks sebelum jawaban pertama
        doc.setTextColor(0,0,0);
        let teks1 = "Steering system (sistem kemudi) adalah ";
        doc.text(teks1, 20, y);

        // Jawaban pertama
        doc.setTextColor(...jawabanArray[0].rgb);
        let x = 20 + doc.getTextWidth(teks1);
        doc.text(jawabanArray[0].teks, x, y);

        // Teks antara jawaban pertama dan kedua
        doc.setTextColor(0,0,0);
        let teks2 = " yang berfungsi untuk mengontrol arah gerak kendaraan dengan ";
        x += doc.getTextWidth(jawabanArray[0].teks);
        doc.text(teks2, x, y);

        // Jawaban kedua
        doc.setTextColor(...jawabanArray[1].rgb);
        x += doc.getTextWidth(teks2);
        doc.text(jawabanArray[1].teks, x, y);

        // Titik terakhir
        doc.setTextColor(0,0,0);
        x += doc.getTextWidth(jawabanArray[1].teks);
        doc.text(".", x, y);

        // ===== GAMBAR MATERI =====
        let gambar = document.getElementById("gambarMateri");
        try {
            let canvas = document.createElement("canvas");
            let ctx = canvas.getContext("2d");
            canvas.width = gambar.naturalWidth;
            canvas.height = gambar.naturalHeight;
            ctx.drawImage(gambar, 0, 0);

            let imgData = canvas.toDataURL("image/png");
            doc.addImage(imgData, "PNG", 20, y + 10, 170, 90);
        } catch(e){
            console.log("gambar gagal");
        }

        doc.save("STEERING SYSTEM.pdf");
    }

    // ===== LOGO =====
    let logo = new Image();
    logo.crossOrigin = "Anonymous";
    logo.src = "https://raw.githubusercontent.com/dadangtrilaksono78-cpu/Materi-Mbah-Dudunk/main/logo.png";

    logo.onload = function(){
        doc.addImage(logo, "PNG", 20, 10, 20, 20, undefined, "FAST");
        buatPDF();
    };
    logo.onerror = function(){
        buatPDF();
    };
}
</script>

</body>
</html>
