<!DOCTYPE html>
<html>
<head>
    <title>Latihan Materi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            line-height: 1.6;
        }

        .input-inline {
            display: inline-block;
            border-bottom: 1px dotted black;
            min-width: 200px;
            padding: 2px 5px;
            outline: none;
        }

        button {
            padding: 12px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>STEERING SYSTEM</h2>

<p>
Steering system (sistem kemudi) adalah sistem pada kendaraan yang berfungsi untuk mengontrol 
<span contenteditable="true" class="input-inline"></span> 
membelokkan roda, biasanya roda depan, sesuai keinginan pengemudi.
</p>

<button onclick="download()">DOWNLOAD MATERI</button>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- Script utama -->
<script>
function download() {
    if (!window.jspdf) {
        alert("Library PDF belum siap, coba refresh halaman");
        return;
    }

    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let judul = document.querySelector("h2").innerText;
    let jawaban = document.querySelector(".input-inline").innerText;

    doc.setFontSize(14);
    doc.text(judul, 10, 20);

    doc.setFontSize(12);

    let teks = "Steering system (sistem kemudi) adalah sistem pada kendaraan yang berfungsi untuk mengontrol " 
               + jawaban + 
               " membelokkan roda, biasanya roda depan, sesuai keinginan pengemudi.";

    let splitText = doc.splitTextToSize(teks, 180);

    doc.text(splitText, 10, 40);

    doc.save("hasil.pdf");
}
</script>
</script>

</body>
</html>
